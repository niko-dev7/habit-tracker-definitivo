<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5F7;
            color: #1D1D1F;
        }
        .font-heading { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;

        // STORAGE SICURO (funziona sia su CodePen che su GitHub Pages che su Emergent)
        const storage = {
            getHabits: () => {
                try { return JSON.parse(localStorage.getItem('habits') || '[]'); }
                catch(e) { return window.__tempHabits || []; }
            },
            setHabits: (habits) => {
                try { localStorage.setItem('habits', JSON.stringify(habits)); }
                catch(e) { window.__tempHabits = habits; }
            },
            getLogs: () => {
                try { return JSON.parse(localStorage.getItem('habitLogs') || '[]'); }
                catch(e) { return window.__tempLogs || []; }
            },
            setLogs: (logs) => {
                try { localStorage.setItem('habitLogs', JSON.stringify(logs)); }
                catch(e) { window.__tempLogs = logs; }
            },
            getSettings: () => {
                try { return JSON.parse(localStorage.getItem('settings') || '{"palette":"#007AFF"}'); }
                catch(e) { return { palette: "#007AFF" }; }
            },
            setSettings: (s) => {
                try { localStorage.setItem('settings', JSON.stringify(s)); }
                catch(e) {}
            }
        };

        const THEMES = [
            { id: "ocean", name: "Ocean Blue", primary: "#007AFF", primarySoft: "#E5F1FF", gradient: "linear-gradient(135deg, #007AFF 0%, #5856D6 100%)" }
        ];

        const WEEKDAYS = [
            {value:0, label:"Lun"}, {value:1, label:"Mar"}, {value:2, label:"Mer"},
            {value:3, label:"Gio"}, {value:4, label:"Ven"}, {value:5, label:"Sab"}, {value:6, label:"Dom"}
        ];

        const Icon = ({name, size=24, color="currentColor"}) => {
            const svgs = {
                Plus: React.createElement('svg',{width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round"},
                    React.createElement('line',{x1:"12",y1:"5",x2:"12",y2:"19"}),
                    React.createElement('line',{x1:"5",y1:"12",x2:"19",y2:"12"})
                ),
                Check: React.createElement('svg',{width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round"},
                    React.createElement('polyline',{points:"20 6 9 17 4 12"})
                ),
                X: React.createElement('svg',{width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},
                    React.createElement('line',{x1:"18",y1:"6",x2:"6",y2:"18"}),
                    React.createElement('line',{x1:"6",y1:"6",x2:"18",y2:"18"})
                ),
                ChevronLeft: React.createElement('svg',{width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round"},
                    React.createElement('polyline',{points:"15 18 9 12 15 6"})
                ),
                ChevronRight: React.createElement('svg',{width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round"},
                    React.createElement('polyline',{points:"9 18 15 12 9 6"})
                ),
                Palette: React.createElement('svg',{width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},
                    React.createElement('circle',{cx:"13.5",cy:"6.5",r:".5",fill:color})
                )
            };
            return svgs[name] || null;
        };

        const HabitTrackerApp = () => {
            const [currentTheme] = useState(THEMES[0]);
            const [activeTab, setActiveTab] = useState("habits");
            const [habits] = useState([]);
            const [selectedDate] = useState(new Date().toISOString().split('T')[0]);

            const today = new Date().toISOString().split('T')[0];

            return React.createElement('div', {
                style: { minHeight: '100vh', backgroundColor: '#F5F5F7', padding: '20px' }
            },
                React.createElement('div', { style: { maxWidth: '448px', margin: '0 auto' } },

                    // Header
                    React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '24px' } },
                        React.createElement('div', null,
                            React.createElement('h1', { className: 'font-heading', style: { fontSize: '36px', fontWeight: 'bold' } }, 'Habit Tracker'),
                            React.createElement('p', { style: { color: '#86868B' } }, 
                                new Date(selectedDate).toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' })
                            )
                        ),
                        React.createElement('button', {
                            style: { width: '48px', height: '48px', borderRadius: '50%', backgroundColor: currentTheme.primary, border: 'none', color: 'white' }
                        }, React.createElement(Icon, { name: 'Palette', size: 20 }))
                    ),

                    // Tabs
                    React.createElement('div', {
                        style: { backgroundColor: '#E5E5EA', padding: '4px', borderRadius: '50px', display: 'flex', marginBottom: '24px' }
                    },
                        React.createElement('button', {
                            onClick: () => setActiveTab('habits'),
                            style: { flex: 1, padding: '12px', borderRadius: '50px', background: activeTab === 'habits' ? 'white' : 'transparent', fontWeight: 600, border: 'none' }
                        }, 'Abitudini'),
                        React.createElement('button', {
                            onClick: () => setActiveTab('stats'),
                            style: { flex: 1, padding: '12px', borderRadius: '50px', background: activeTab === 'stats' ? 'white' : 'transparent', fontWeight: 600, border: 'none' }
                        }, 'Statistiche')
                    ),

                    // Contenuto
                    activeTab === 'habits' ?
                    React.createElement('div', { style: { textAlign: 'center', padding: '80px 20px', color: '#34C759', fontSize: '18px' } },
                        React.createElement('p', null, "✅ App caricata correttamente!"),
                        React.createElement('p', { style: { marginTop: '12px', color: '#666' } }, 
                            "Ora dovresti vedere il selettore data, il cerchio di progresso e il pulsante Nuova Abitudine."
                        )
                    ) :
                    React.createElement('div', { style: { textAlign: 'center', padding: '80px 20px', color: '#86868B' } },
                        React.createElement('p', null, "Sezione Statistiche - In sviluppo")
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(HabitTrackerApp));
    </script>
</body>
</html>
