<!DOCTYPE html>
<html lang= "it ">
<head>
    <meta charset= "UTF-8 ">
    <meta name= "viewport " content= "width=device-width, initial-scale=1.0 ">
    <title>Habit Tracker</title>
    
    <!-- Google Fonts -->
    <link href= "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap " rel= "stylesheet ">
    
    <!-- React, ReactDOM, Babel -->
    <script crossorigin src= "https://unpkg.com/react@18/umd/react.production.min.js "></script>
    <script crossorigin src= "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js "></script>
    <script src= "https://unpkg.com/@babel/standalone/babel.min.js "></script>
    
    <!-- Recharts for charts -->
    <script src= "https://unpkg.com/recharts@2.5.0/dist/Recharts.js "></script>
    
    <!-- Lucide Icons -->
    <script src= "https://unpkg.com/lucide@latest "></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5F7;
            color: #1D1D1F;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .font-heading {
            font-family: 'Manrope', sans-serif;
        }
        
        .delicate-shadow {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }
        
        .glass-shadow {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
        }
        
        .smooth-transition {
            transition: all 300ms cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        button {
            border: none;
            background: none;
            cursor: pointer;
            font-family: inherit;
        }
        
        input, select {
            font-family: inherit;
        }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id= "root "></div>

    <script type= "text/babel ">
        const { useState, useEffect } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

        // ============ STORAGE UTILITIES ============
        const storage = {
            getHabits: () => JSON.parse(localStorage.getItem('habits') || '[]'),
            setHabits: (habits) => localStorage.setItem('habits', JSON.stringify(habits)),
            
            getLogs: () => JSON.parse(localStorage.getItem('habitLogs') || '[]'),
            setLogs: (logs) => localStorage.setItem('habitLogs', JSON.stringify(logs)),
            
            getSettings: () => JSON.parse(localStorage.getItem('settings') || '{ "palette ": "#007AFF "}'),
            setSettings: (settings) => localStorage.setItem('settings', JSON.stringify(settings)),
        };

        // ============ THEMES ============
        const THEMES = [
            { id:  "ocean ", name:  "Ocean Blue ", primary:  "#007AFF ", primarySoft:  "#E5F1FF ", gradient:  "linear-gradient(135deg, #007AFF 0%, #5856D6 100%) " },
            { id:  "sage ", name:  "Sage Green ", primary:  "#34C759 ", primarySoft:  "#E8F8EB ", gradient:  "linear-gradient(135deg, #34C759 0%, #30B0C7 100%) " },
            { id:  "sunset ", name:  "Sunset Orange ", primary:  "#FF9500 ", primarySoft:  "#FFF4E5 ", gradient:  "linear-gradient(135deg, #FF9500 0%, #FF2D55 100%) " },
            { id:  "lavender ", name:  "Lavender ", primary:  "#AF52DE ", primarySoft:  "#F7EFFF ", gradient:  "linear-gradient(135deg, #AF52DE 0%, #5856D6 100%) " },
            { id:  "mono ", name:  "Minimalist Black ", primary:  "#1D1D1F ", primarySoft:  "#E5E5EA ", gradient:  "linear-gradient(135deg, #1D1D1F 0%, #86868B 100%) " },
            { id:  "rose ", name:  "Rose Pink ", primary:  "#FF2D55 ", primarySoft:  "#FFE5EC ", gradient:  "linear-gradient(135deg, #FF2D55 0%, #AF52DE 100%) " },
            { id:  "teal ", name:  "Teal ", primary:  "#30B0C7 ", primarySoft:  "#E0F7FA ", gradient:  "linear-gradient(135deg, #30B0C7 0%, #34C759 100%) " },
            { id:  "indigo ", name:  "Indigo ", primary:  "#5856D6 ", primarySoft:  "#EFEFF4 ", gradient:  "linear-gradient(135deg, #5856D6 0%, #007AFF 100%) " }
        ];

        const PRESET_COLORS = [ "#FF2D55 ",  "#FF9500 ",  "#FFCC00 ",  "#34C759 ",  "#30B0C7 ",  "#007AFF ",  "#5856D6 ",  "#AF52DE ",  "#FF2D55 ",  "#8E8E93 "];

        const WEEKDAYS = [
            { value: 0, label:  "Lun ", fullLabel:  "Lunedì " },
            { value: 1, label:  "Mar ", fullLabel:  "Martedì " },
            { value: 2, label:  "Mer ", fullLabel:  "Mercoledì " },
            { value: 3, label:  "Gio ", fullLabel:  "Giovedì " },
            { value: 4, label:  "Ven ", fullLabel:  "Venerdì " },
            { value: 5, label:  "Sab ", fullLabel:  "Sabato " },
            { value: 6, label:  "Dom ", fullLabel:  "Domenica " },
        ];

        // ============ ICONS ============
        const Icon = ({ name, size = 24, strokeWidth = 2, ...props }) => {
            const icons = {
                Plus: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><line x1= "12 " y1= "5 " x2= "12 " y2= "19 "/><line x1= "5 " y1= "12 " x2= "19 " y2= "12 "/></svg>,
                Check: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><polyline points= "20 6 9 17 4 12 "/></svg>,
                X: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><line x1= "18 " y1= "6 " x2= "6 " y2= "18 "/><line x1= "6 " y1= "6 " x2= "18 " y2= "18 "/></svg>,
                ChevronLeft: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><polyline points= "15 18 9 12 15 6 "/></svg>,
                ChevronRight: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><polyline points= "9 18 15 12 9 6 "/></svg>,
                ChevronDown: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><polyline points= "6 9 12 15 18 9 "/></svg>,
                Flame: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><path d= "M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z "/></svg>,
                Edit3: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><path d= "M12 20h9 "/><path d= "M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z "/></svg>,
                Trash2: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><polyline points= "3 6 5 6 21 6 "/><path d= "M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2 "/><line x1= "10 " y1= "11 " x2= "10 " y2= "17 "/><line x1= "14 " y1= "11 " x2= "14 " y2= "17 "/></svg>,
                Palette: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><circle cx= "13.5 " cy= "6.5 " r= ".5 " fill= "currentColor "/><circle cx= "17.5 " cy= "10.5 " r= ".5 " fill= "currentColor "/><circle cx= "8.5 " cy= "7.5 " r= ".5 " fill= "currentColor "/><circle cx= "6.5 " cy= "12.5 " r= ".5 " fill= "currentColor "/><path d= "M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z "/></svg>,
                Trophy: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><path d= "M6 9H4.5a2.5 2.5 0 0 1 0-5H6 "/><path d= "M18 9h1.5a2.5 2.5 0 0 0 0-5H18 "/><path d= "M4 22h16 "/><path d= "M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22 "/><path d= "M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22 "/><path d= "M18 2H6v7a6 6 0 0 0 12 0V2Z "/></svg>,
                Calendar: () => <svg width={size} height={size} viewBox= "0 0 24 24 " fill= "none " stroke= "currentColor " strokeWidth={strokeWidth} strokeLinecap= "round " strokeLinejoin= "round " {...props}><rect x= "3 " y= "4 " width= "18 " height= "18 " rx= "2 " ry= "2 "/><line x1= "16 " y1= "2 " x2= "16 " y2= "6 "/><line x1= "8 " y1= "2 " x2= "8 " y2= "6 "/><line x1= "3 " y1= "10 " x2= "21 " y2= "10 "/></svg>,
            };
            const IconComponent = icons[name];
            return IconComponent ? <IconComponent /> : null;
        };

        // ============ TOAST NOTIFICATION ============
        const Toast = ({ message, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 2000);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div style={{
                    position: 'fixed',
                    top: '20px',
                    left: '50%',
                    transform: 'translateX(-50%)',
                    background: 'rgba(29, 29, 31, 0.95)',
                    color: 'white',
                    padding: '12px 24px',
                    borderRadius: '20px',
                    zIndex: 10000,
                    fontWeight: 500,
                    fontSize: '14px',
                    backdropFilter: 'blur(10px)',
                    boxShadow: '0 8px 30px rgba(0,0,0,0.2)'
                }}>
                    {message}
                </div>
            );
        };

        // ============ HABIT MODAL ============
        const HabitModal = ({ habit, onSave, onClose, currentTheme }) => {
            const [formData, setFormData] = useState({
                name:  " ",
                color:  "#007AFF ",
                frequency:  "daily ",
                specific_days: [0, 1, 2, 3, 4],
            });

            useEffect(() => {
                if (habit) {
                    setFormData({
                        name: habit.name,
                        color: habit.color ||  "#007AFF ",
                        frequency: habit.frequency,
                        specific_days: habit.specific_days || [0, 1, 2, 3, 4],
                    });
                }
            }, [habit]);

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
            };

            const toggleWeekday = (dayValue) => {
                const currentDays = formData.specific_days || [];
                if (currentDays.includes(dayValue)) {
                    setFormData({
                        ...formData,
                        specific_days: currentDays.filter(d => d !== dayValue)
                    });
                } else {
                    setFormData({
                        ...formData,
                        specific_days: [...currentDays, dayValue].sort()
                    });
                }
            };

            return (
                <div style={{
                    position: 'fixed',
                    inset: 0,
                    backgroundColor: 'rgba(0,0,0,0.3)',
                    backdropFilter: 'blur(4px)',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    zIndex: 1000,
                    padding: '16px'
                }} onClick={onClose}>
                    <div style={{
                        backgroundColor: 'rgba(255,255,255,0.95)',
                        backdropFilter: 'blur(20px)',
                        borderRadius: '24px',
                        maxWidth: '448px',
                        width: '100%',
                        border: '1px solid rgba(255,255,255,0.5)',
                        boxShadow: '0 12px 40px rgba(0,0,0,0.08)'
                    }} onClick={e => e.stopPropagation()}>
                        <div style={{
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'space-between',
                            padding: '24px',
                            borderBottom: '1px solid rgba(0,0,0,0.05)'
                        }}>
                            <h3 className= "font-heading " style={{ fontSize: '24px', fontWeight: 'bold', color: '#1D1D1F' }}>
                                {habit ?  "Modifica Abitudine " :  "Nuova Abitudine "}
                            </h3>
                            <button onClick={onClose} style={{
                                padding: '8px',
                                borderRadius: '50%',
                                transition: 'background 0.3s'
                            }} onMouseEnter={e => e.target.style.backgroundColor = '#F2F2F7'} onMouseLeave={e => e.target.style.backgroundColor = 'transparent'}>
                                <Icon name= "X " size={20} strokeWidth={2} color= "#86868B " />
                            </button>
                        </div>

                        <form onSubmit={handleSubmit} style={{ padding: '24px', display: 'flex', flexDirection: 'column', gap: '20px' }}>
                            <div>
                                <label style={{ display: 'block', fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600, color: '#86868B', marginBottom: '8px' }}>
                                    Nome Abitudine
                                </label>
                                <input
                                    type= "text "
                                    value={formData.name}
                                    onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                    style={{
                                        width: '100%',
                                        padding: '12px 16px',
                                        backgroundColor: '#F2F2F7',
                                        borderRadius: '16px',
                                        border: 'none',
                                        outline: 'none',
                                        fontSize: '14px',
                                        fontWeight: 500,
                                        color: '#1D1D1F'
                                    }}
                                    placeholder= "Es. Fare esercizio "
                                    required
                                />
                            </div>

                            <div>
                                <label style={{ display: 'block', fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600, color: '#86868B', marginBottom: '12px' }}>
                                    Colore
                                </label>
                                <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                                    {PRESET_COLORS.map((color) => (
                                        <button
                                            key={color}
                                            type= "button "
                                            onClick={() => setFormData({ ...formData, color })}
                                            style={{
                                                width: '48px',
                                                height: '48px',
                                                borderRadius: '50%',
                                                backgroundColor: color,
                                                boxShadow: formData.color === color
                                                    ? `0 0 0 3px white, 0 0 0 5px ${color}`
                                                    :  "0 2px 8px rgba(0,0,0,0.1) ",
                                                transition: 'all 0.3s'
                                            }}
                                        />
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label style={{ display: 'block', fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600, color: '#86868B', marginBottom: '8px' }}>
                                    Frequenza
                                </label>
                                <div style={{ display: 'flex', gap: '8px' }}>
                                    {[{ value:  "daily ", label:  "Giornaliera " }, { value:  "specific_days ", label:  "Giorni Specifici " }].map((freq) => (
                                        <button
                                            key={freq.value}
                                            type= "button "
                                            onClick={() => setFormData({ ...formData, frequency: freq.value })}
                                            style={{
                                                flex: 1,
                                                padding: '12px 16px',
                                                borderRadius: '16px',
                                                fontWeight: 600,
                                                fontSize: '14px',
                                                transition: 'all 0.3s',
                                                backgroundColor: formData.frequency === freq.value ? currentTheme.primary :  "#F2F2F7 ",
                                                color: formData.frequency === freq.value ?  "white " :  "#86868B "
                                            }}
                                        >
                                            {freq.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {formData.frequency ===  "specific_days " && (
                                <div>
                                    <label style={{ display: 'block', fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600, color: '#86868B', marginBottom: '12px' }}>
                                        Giorni della Settimana
                                    </label>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '8px' }}>
                                        {WEEKDAYS.map((day) => {
                                            const isSelected = formData.specific_days?.includes(day.value);
                                            return (
                                                <button
                                                    key={day.value}
                                                    type= "button "
                                                    onClick={() => toggleWeekday(day.value)}
                                                    style={{
                                                        aspectRatio: '1',
                                                        borderRadius: '16px',
                                                        fontWeight: 600,
                                                        fontSize: '12px',
                                                        transition: 'all 0.3s',
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        justifyContent: 'center',
                                                        backgroundColor: isSelected ? currentTheme.primary :  "#F2F2F7 ",
                                                        color: isSelected ?  "white " :  "#86868B "
                                                    }}
                                                    title={day.fullLabel}
                                                >
                                                    {day.label}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <p style={{ fontSize: '12px', color: '#86868B', marginTop: '8px' }}>
                                        {formData.specific_days?.length || 0} giorni selezionati
                                    </p>
                                </div>
                            )}

                            <div style={{ display: 'flex', gap: '12px', paddingTop: '16px' }}>
                                <button
                                    type= "button "
                                    onClick={onClose}
                                    style={{
                                        flex: 1,
                                        padding: '12px 16px',
                                        borderRadius: '50px',
                                        fontWeight: 600,
                                        color: '#86868B',
                                        backgroundColor: '#F2F2F7',
                                        boxShadow: '0 4px 24px rgba(0,0,0,0.02)',
                                        transition: 'all 0.3s'
                                    }}
                                    onMouseEnter={e => e.target.style.backgroundColor = '#E5E5EA'}
                                    onMouseLeave={e => e.target.style.backgroundColor = '#F2F2F7'}
                                >
                                    Annulla
                                </button>
                                <button
                                    type= "submit "
                                    style={{
                                        flex: 1,
                                        padding: '12px 16px',
                                        borderRadius: '50px',
                                        fontWeight: 600,
                                        color: 'white',
                                        backgroundColor: currentTheme.primary,
                                        boxShadow: '0 4px 24px rgba(0,0,0,0.02)',
                                        transition: 'all 0.3s'
                                    }}
                                >
                                    {habit ?  "Salva " :  "Crea "}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // ============ THEME SWITCHER ============
        const ThemeSwitcher = ({ themes, currentTheme, onSelect, onClose }) => {
            return (
                <div style={{
                    position: 'fixed',
                    inset: 0,
                    backgroundColor: 'rgba(0,0,0,0.3)',
                    backdropFilter: 'blur(4px)',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    zIndex: 1000,
                    padding: '16px'
                }} onClick={onClose}>
                    <div style={{
                        backgroundColor: 'rgba(255,255,255,0.95)',
                        backdropFilter: 'blur(20px)',
                        borderRadius: '24px',
                        maxWidth: '448px',
                        width: '100%',
                        border: '1px solid rgba(255,255,255,0.5)',
                        boxShadow: '0 12px 40px rgba(0,0,0,0.08)'
                    }} onClick={e => e.stopPropagation()}>
                        <div style={{
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'space-between',
                            padding: '24px',
                            borderBottom: '1px solid rgba(0,0,0,0.05)'
                        }}>
                            <h3 className= "font-heading " style={{ fontSize: '24px', fontWeight: 'bold', color: '#1D1D1F' }}>
                                Scegli il Tema
                            </h3>
                            <button onClick={onClose} style={{ padding: '8px', borderRadius: '50%' }}>
                                <Icon name= "X " size={20} strokeWidth={2} color= "#86868B " />
                            </button>
                        </div>

                        <div style={{ padding: '24px' }}>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '16px' }}>
                                {themes.map((theme) => (
                                    <button
                                        key={theme.id}
                                        onClick={() => {
                                            onSelect(theme);
                                            onClose();
                                        }}
                                        style={{
                                            display: 'flex',
                                            flexDirection: 'column',
                                            alignItems: 'center',
                                            gap: '8px'
                                        }}
                                    >
                                        <div
                                            style={{
                                                width: '64px',
                                                height: '64px',
                                                borderRadius: '50%',
                                                background: theme.gradient,
                                                boxShadow: currentTheme.id === theme.id
                                                    ? `0 0 0 3px white, 0 0 0 5px ${theme.primary}`
                                                    :  "0 4px 12px rgba(0,0,0,0.1) ",
                                                transition: 'all 0.3s'
                                            }}
                                        />
                                        <span style={{ fontSize: '12px', fontWeight: 500, color: '#86868B', textAlign: 'center' }}>
                                            {theme.name}
                                        </span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============ MAIN APP ============
        const HabitTrackerApp = () => {
            const [currentTheme, setCurrentTheme] = useState(THEMES[0]);
            const [habits, setHabits] = useState([]);
            const [habitLogs, setHabitLogs] = useState([]);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split( "T ")[0]);
            const [activeTab, setActiveTab] = useState( "habits ");
            const [showThemeSwitcher, setShowThemeSwitcher] = useState(false);
            const [showHabitModal, setShowHabitModal] = useState(false);
            const [editingHabit, setEditingHabit] = useState(null);
            const [toast, setToast] = useState(null);

            const today = new Date().toISOString().split( "T ")[0];

            // Load data from localStorage
            useEffect(() => {
                const savedHabits = storage.getHabits();
                const savedLogs = storage.getLogs();
                const savedSettings = storage.getSettings();
                
                setHabits(savedHabits);
                setHabitLogs(savedLogs);
                
                const savedTheme = THEMES.find(t => t.primary === savedSettings.palette);
                if (savedTheme) setCurrentTheme(savedTheme);
            }, []);

            // Save to localStorage whenever data changes
            useEffect(() => {
                storage.setHabits(habits);
            }, [habits]);

            useEffect(() => {
                storage.setLogs(habitLogs);
            }, [habitLogs]);

            const showToast = (message) => {
                setToast(message);
            };

            const getDayOfWeek = (dateString) => {
                const date = new Date(dateString);
                const jsDay = date.getDay();
                return jsDay === 0 ? 6 : jsDay - 1;
            };

            const selectedDayOfWeek = getDayOfWeek(selectedDate);

            const filteredHabits = habits.filter(habit => {
                if (habit.frequency ===  "daily ") return true;
                if (habit.frequency ===  "specific_days " && habit.specific_days) {
                    return habit.specific_days.includes(selectedDayOfWeek);
                }
                return true;
            });

            const isHabitCompleted = (habitId) => {
                return habitLogs.some(
                    (log) => log.habit_id === habitId && log.date === selectedDate && log.completed
                );
            };

            const handleToggleHabit = (habitId) => {
                const existingLog = habitLogs.find(
                    (log) => log.habit_id === habitId && log.date === selectedDate
                );

                if (existingLog) {
                    setHabitLogs(habitLogs.map(log => 
                        log.habit_id === habitId && log.date === selectedDate
                            ? { ...log, completed: !log.completed }
                            : log
                    ));
                } else {
                    setHabitLogs([...habitLogs, {
                        habit_id: habitId,
                        date: selectedDate,
                        completed: true
                    }]);
                }
                showToast( "Abitudine aggiornata! ");
            };

            const handleSaveHabit = (habitData) => {
                if (editingHabit) {
                    setHabits(habits.map(h => h.id === editingHabit.id ? { ...h, ...habitData } : h));
                    showToast( "Abitudine modificata! ");
                } else {
                    const newHabit = {
                        ...habitData,
                        id: Date.now().toString(),
                        created_at: new Date().toISOString()
                    };
                    setHabits([...habits, newHabit]);
                    showToast( "Abitudine creata! ");
                }
                setShowHabitModal(false);
                setEditingHabit(null);
            };

            const handleDeleteHabit = (habitId) => {
                setHabits(habits.filter(h => h.id !== habitId));
                setHabitLogs(habitLogs.filter(log => log.habit_id !== habitId));
                showToast( "Abitudine eliminata! ");
            };

            const handleThemeChange = (theme) => {
                setCurrentTheme(theme);
                storage.setSettings({ palette: theme.primary });
            };

            const changeDate = (days) => {
                const date = new Date(selectedDate);
                date.setDate(date.getDate() + days);
                const newDate = date.toISOString().split( "T ")[0];
                if (newDate <= today) {
                    setSelectedDate(newDate);
                }
            };

            const completedCount = filteredHabits.filter(h => isHabitCompleted(h.id)).length;
            const percentage = filteredHabits.length > 0 ? Math.round((completedCount / filteredHabits.length) * 100) : 0;

            const circleRadius = 60;
            const circumference = 2 * Math.PI * circleRadius;
            const strokeDashoffset = circumference - (percentage / 100) * circumference;

            return (
                <div style={{ minHeight: '100vh', backgroundColor: '#F5F5F7', position: 'relative', overflow: 'hidden' }}>
                    {/* Background blobs */}
                    <div style={{
                        position: 'absolute',
                        width: '256px',
                        height: '256px',
                        opacity: 0.1,
                        filter: 'blur(60px)',
                        borderRadius: '50%',
                        top: 0,
                        right: 0,
                        background: currentTheme.gradient
                    }} />
                    <div style={{
                        position: 'absolute',
                        width: '256px',
                        height: '256px',
                        opacity: 0.1,
                        filter: 'blur(60px)',
                        borderRadius: '50%',
                        bottom: 0,
                        left: 0,
                        background: currentTheme.gradient
                    }} />

                    <div style={{
                        width: '100%',
                        maxWidth: '448px',
                        minHeight: '100vh',
                        margin: '0 auto',
                        display: 'flex',
                        flexDirection: 'column',
                        position: 'relative',
                        padding: '20px'
                    }}>
                        {/* Header */}
                        <div style={{ marginBottom: '24px', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
                            <div>
                                <h1 className= "font-heading " style={{ fontSize: '36px', fontWeight: 'bold', letterSpacing: '-0.02em', color: '#1D1D1F', marginBottom: '8px' }}>
                                    Habit Tracker
                                </h1>
                                <p style={{ color: '#86868B', fontSize: '14px', fontWeight: 500 }}>
                                    {new Date().toLocaleDateString( "it-IT ", {
                                        weekday:  "long ",
                                        day:  "numeric ",
                                        month:  "long ",
                                    })}
                                </p>
                            </div>

                            <button
                                onClick={() => setShowThemeSwitcher(true)}
                                style={{
                                    width: '48px',
                                    height: '48px',
                                    borderRadius: '50%',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    transition: 'all 0.3s',
                                    backgroundColor: currentTheme.primary,
                                    boxShadow: '0 8px 30px rgba(0,0,0,0.04)'
                                }}
                            >
                                <Icon name= "Palette " size={20} strokeWidth={2} color= "white " />
                            </button>
                        </div>

                        {/* Tab Navigation */}
                        <div style={{
                            backgroundColor: 'rgba(229, 229, 234, 0.5)',
                            padding: '4px',
                            borderRadius: '50px',
                            backdropFilter: 'blur(10px)',
                            display: 'flex',
                            width: '100%',
                            marginBottom: '24px',
                            position: 'relative'
                        }}>
                            <button
                                onClick={() => setActiveTab( "habits ")}
                                style={{
                                    flex: 1,
                                    padding: '10px 0',
                                    fontSize: '14px',
                                    fontWeight: 600,
                                    borderRadius: '50px',
                                    position: 'relative',
                                    zIndex: 10,
                                    transition: 'color 0.3s',
                                    color: activeTab ===  "habits " ? currentTheme.primary :  "#86868B ",
                                    backgroundColor: activeTab ===  "habits " ?  "white " :  "transparent ",
                                    boxShadow: activeTab ===  "habits " ?  "0 2px 8px rgba(0,0,0,0.06) " :  "none "
                                }}
                            >
                                Abitudini
                            </button>
                            <button
                                onClick={() => setActiveTab( "stats ")}
                                style={{
                                    flex: 1,
                                    padding: '10px 0',
                                    fontSize: '14px',
                                    fontWeight: 600,
                                    borderRadius: '50px',
                                    position: 'relative',
                                    zIndex: 10,
                                    transition: 'color 0.3s',
                                    color: activeTab ===  "stats " ? currentTheme.primary :  "#86868B ",
                                    backgroundColor: activeTab ===  "stats " ?  "white " :  "transparent ",
                                    boxShadow: activeTab ===  "stats " ?  "0 2px 8px rgba(0,0,0,0.06) " :  "none "
                                }}
                            >
                                Statistiche
                            </button>
                        </div>

                        {/* Content */}
                        {activeTab ===  "habits " ? (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '24px', paddingBottom: '32px' }}>
                                {/* Date Selector */}
                                <div style={{
                                    backgroundColor: 'rgba(255,255,255,0.8)',
                                    backdropFilter: 'blur(20px)',
                                    borderRadius: '24px',
                                    padding: '20px',
                                    boxShadow: '0 8px 30px rgba(0,0,0,0.04)',
                                    border: '1px solid white'
                                }}>
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '4px' }}>
                                        <button onClick={() => changeDate(-1)} style={{ padding: '8px', borderRadius: '50%', transition: 'background 0.3s' }} onMouseEnter={e => e.target.style.backgroundColor = '#F2F2F7'} onMouseLeave={e => e.target.style.backgroundColor = 'transparent'}>
                                            <Icon name= "ChevronLeft " size={20} strokeWidth={2.5} color= "#86868B " />
                                        </button>

                                        <div style={{ textAlign: 'center' }}>
                                            <div className= "font-heading " style={{ fontSize: '20px', fontWeight: 'bold', color: '#1D1D1F' }}>
                                                {new Date(selectedDate).toLocaleDateString( "it-IT ", {
                                                    weekday:  "long ",
                                                    day:  "numeric ",
                                                    month:  "long ",
                                                })}
                                            </div>
                                            {selectedDate !== today && (
                                                <button
                                                    onClick={() => setSelectedDate(today)}
                                                    style={{
                                                        fontSize: '12px',
                                                        fontWeight: 600,
                                                        marginTop: '4px',
                                                        padding: '4px 12px',
                                                        borderRadius: '50px',
                                                        transition: 'all 0.3s',
                                                        backgroundColor: currentTheme.primarySoft,
                                                        color: currentTheme.primary
                                                    }}
                                                >
                                                    Torna a oggi
                                                </button>
                                            )}
                                        </div>

                                        <button
                                            onClick={() => changeDate(1)}
                                            disabled={selectedDate === today}
                                            style={{
                                                padding: '8px',
                                                borderRadius: '50%',
                                                transition: 'background 0.3s',
                                                opacity: selectedDate === today ? 0.3 : 1
                                            }}
                                            onMouseEnter={e => selectedDate !== today && (e.target.style.backgroundColor = '#F2F2F7')}
                                            onMouseLeave={e => e.target.style.backgroundColor = 'transparent'}
                                        >
                                            <Icon name= "ChevronRight " size={20} strokeWidth={2.5} color= "#86868B " />
                                        </button>
                                    </div>
                                </div>

                                {/* Progress Circle */}
                                <div style={{
                                    backgroundColor: 'rgba(255,255,255,0.8)',
                                    backdropFilter: 'blur(20px)',
                                    borderRadius: '24px',
                                    padding: '24px',
                                    boxShadow: '0 8px 30px rgba(0,0,0,0.04)',
                                    border: '1px solid white'
                                }}>
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                        <div style={{ flex: 1 }}>
                                            <h3 className= "font-heading " style={{ fontSize: '18px', fontWeight: 'bold', color: '#1D1D1F', marginBottom: '4px' }}>
                                                Progresso Giornaliero
                                            </h3>
                                            <p style={{ fontSize: '14px', color: '#86868B', fontWeight: 500 }}>
                                                {completedCount}/{filteredHabits.length} abitudini completate
                                            </p>
                                        </div>

                                        <div style={{ position: 'relative' }}>
                                            <svg width= "120 " height= "120 " style={{ transform: 'rotate(-90deg)' }}>
                                                <circle
                                                    cx= "60 "
                                                    cy= "60 "
                                                    r={circleRadius}
                                                    stroke={currentTheme.primarySoft}
                                                    strokeWidth= "10 "
                                                    fill= "none "
                                                />
                                                <circle
                                                    cx= "60 "
                                                    cy= "60 "
                                                    r={circleRadius}
                                                    stroke={currentTheme.primary}
                                                    strokeWidth= "10 "
                                                    fill= "none "
                                                    strokeDasharray={circumference}
                                                    strokeDashoffset={strokeDashoffset}
                                                    strokeLinecap= "round "
                                                    style={{ transition: 'stroke-dashoffset 1s ease' }}
                                                />
                                            </svg>
                                            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                                <div style={{ textAlign: 'center' }}>
                                                    <div className= "font-heading " style={{ fontSize: '24px', fontWeight: 'bold', color: currentTheme.primary }}>
                                                        {percentage}%
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Add Habit Button */}
                                <button
                                    onClick={() => {
                                        setEditingHabit(null);
                                        setShowHabitModal(true);
                                    }}
                                    style={{
                                        width: '100%',
                                        background: `linear-gradient(135deg, ${currentTheme.primarySoft} 0%, white 100%)`,
                                        borderRadius: '24px',
                                        padding: '20px',
                                        boxShadow: '0 8px 30px rgba(0,0,0,0.04)',
                                        display: 'flex',
                                        alignItems: 'center',
                                        justifyContent: 'center',
                                        gap: '12px',
                                        border: '1px solid rgba(0,0,0,0.05)',
                                        transition: 'all 0.3s'
                                    }}
                                    onMouseEnter={e => e.target.style.boxShadow = '0 12px 40px rgba(0,0,0,0.08)'}
                                    onMouseLeave={e => e.target.style.boxShadow = '0 8px 30px rgba(0,0,0,0.04)'}
                                >
                                    <div style={{
                                        width: '40px',
                                        height: '40px',
                                        borderRadius: '50%',
                                        backgroundColor: currentTheme.primary,
                                        display: 'flex',
                                        alignItems: 'center',
                                        justifyContent: 'center'
                                    }}>
                                        <Icon name= "Plus " size={20} strokeWidth={2.5} color= "white " />
                                    </div>
                                    <span className= "font-heading " style={{ fontSize: '18px', fontWeight: 600, color: currentTheme.primary }}>
                                        Nuova Abitudine
                                    </span>
                                </button>

                                {/* Habits List */}
                                {filteredHabits.length === 0 ? (
                                    <div style={{
                                        backgroundColor: 'rgba(255,255,255,0.8)',
                                        backdropFilter: 'blur(20px)',
                                        borderRadius: '24px',
                                        padding: '48px',
                                        textAlign: 'center',
                                        boxShadow: '0 8px 30px rgba(0,0,0,0.04)',
                                        border: '1px solid white'
                                    }}>
                                        <div style={{
                                            width: '80px',
                                            height: '80px',
                                            borderRadius: '50%',
                                            margin: '0 auto 16px',
                                            display: 'flex',
                                            alignItems: 'center',
                                            justifyContent: 'center',
                                            backgroundColor: currentTheme.primarySoft
                                        }}>
                                            <Icon name= "Plus " size={32} strokeWidth={2} color={currentTheme.primary} />
                                        </div>
                                        <p style={{ color: '#86868B', fontWeight: 500, fontSize: '16px' }}>Nessuna abitudine per questo giorno</p>
                                        <p style={{ color: '#86868B', fontSize: '14px', marginTop: '4px' }}>Aggiungi abitudini o modifica i giorni di quelle esistenti</p>
                                    </div>
                                ) : (
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                        {filteredHabits.map((habit) => {
                                            const completed = isHabitCompleted(habit.id);
                                            const habitColor = habit.color ||  "#007AFF ";

                                            return (
                                                <div key={habit.id} style={{ position: 'relative' }} className= "habit-card ">
                                                    <button
                                                        onClick={() => handleToggleHabit(habit.id)}
                                                        style={{
                                                            width: '100%',
                                                            backgroundColor: 'white',
                                                            borderRadius: '24px',
                                                            padding: '16px',
                                                            boxShadow: '0 8px 30px rgba(0,0,0,0.04)',
                                                            display: 'flex',
                                                            alignItems: 'center',
                                                            justifyContent: 'space-between',
                                                            border: '1px solid rgba(0,0,0,0.05)',
                                                            transition: 'all 0.3s'
                                                        }}
                                                        onMouseEnter={e => e.target.style.boxShadow = '0 12px 40px rgba(0,0,0,0.08)'}
                                                        onMouseLeave={e => e.target.style.boxShadow = '0 8px 30px rgba(0,0,0,0.04)'}
                                                    >
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                                            <div style={{
                                                                width: '12px',
                                                                height: '12px',
                                                                borderRadius: '50%',
                                                                backgroundColor: habitColor
                                                            }} />
                                                            <div style={{ textAlign: 'left' }}>
                                                                <div style={{ fontWeight: 600, fontSize: '16px', color: '#1D1D1F' }}>
                                                                    {habit.name}
                                                                </div>
                                                                {habit.frequency ===  "specific_days " && habit.specific_days && (
                                                                    <div style={{ fontSize: '12px', color: '#86868B', fontWeight: 500, marginTop: '2px' }}>
                                                                        {habit.specific_days.length} giorni/settimana
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>

                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                                            <div
                                                                style={{
                                                                    width: '48px',
                                                                    height: '48px',
                                                                    borderRadius: '50%',
                                                                    display: 'flex',
                                                                    alignItems: 'center',
                                                                    justifyContent: 'center',
                                                                    transition: 'all 0.3s',
                                                                    backgroundColor: completed ? currentTheme.primary :  "#F2F2F7 ",
                                                                    boxShadow: completed ? `0 4px 12px ${currentTheme.primarySoft}` :  "none "
                                                                }}
                                                            >
                                                                {completed && <Icon name= "Check " size={20} strokeWidth={2.5} color= "white " />}
                                                            </div>
                                                        </div>
                                                    </button>

                                                    <div style={{
                                                        position: 'absolute',
                                                        top: '16px',
                                                        right: '16px',
                                                        opacity: 0,
                                                        display: 'flex',
                                                        gap: '8px',
                                                        pointerEvents: 'none',
                                                        transition: 'opacity 0.3s'
                                                    }} className= "habit-actions ">
                                                        <button
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                setEditingHabit(habit);
                                                                setShowHabitModal(true);
                                                            }}
                                                            style={{
                                                                padding: '8px',
                                                                backgroundColor: 'white',
                                                                borderRadius: '50%',
                                                                boxShadow: '0 4px 24px rgba(0,0,0,0.02)'
                                                            }}
                                                        >
                                                            <Icon name= "Edit3 " size={14} strokeWidth={2} color= "#86868B " />
                                                        </button>
                                                        <button
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                handleDeleteHabit(habit.id);
                                                            }}
                                                            style={{
                                                                padding: '8px',
                                                                backgroundColor: '#FEE',
                                                                borderRadius: '50%',
                                                                boxShadow: '0 4px 24px rgba(0,0,0,0.02)'
                                                            }}
                                                        >
                                                            <Icon name= "Trash2 " size={14} strokeWidth={2} color= "#ef4444 " />
                                                        </button>
                                                    </div>
                                                    
                                                    <style jsx>{`
                                                        .habit-card:hover .habit-actions {
                                                            opacity: 1;
                                                            pointer-events: auto;
                                                        }
                                                    `}</style>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div style={{ textAlign: 'center', padding: '48px 0', color: '#86868B' }}>
                                <p style={{ fontSize: '16px', fontWeight: 500 }}>
                                    Sezione Statistiche - In sviluppo
                                </p>
                                <p style={{ fontSize: '14px', marginTop: '8px' }}>
                                    Questa versione offline include solo la gestione delle abitudini.
                                    <br/>
                                    Per statistiche complete, usa la versione web completa.
                                </p>
                            </div>
                        )}
                    </div>

                    {/* Modals */}
                    {showHabitModal && (
                        <HabitModal
                            habit={editingHabit}
                            onSave={handleSaveHabit}
                            onClose={() => {
                                setShowHabitModal(false);
                                setEditingHabit(null);
                            }}
                            currentTheme={currentTheme}
                        />
                    )}

                    {showThemeSwitcher && (
                        <ThemeSwitcher
                            themes={THEMES}
                            currentTheme={currentTheme}
                            onSelect={handleThemeChange}
                            onClose={() => setShowThemeSwitcher(false)}
                        />
                    )}

                    {/* Toast */}
                    {toast && <Toast message={toast} onClose={() => setToast(null)} />}
                </div>
            );
        };

        // Cancella la vecchia riga 1061 e incolla queste tre:
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<HabitTrackerApp />);
    </script>
</body>
</html>
